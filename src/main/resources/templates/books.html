<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="container mt-4">

<div th:replace="fragments/navbar :: navbar"></div>

<!-- SEARCH -->
<form th:action="@{/books/search}" method="get" class="mb-3 d-flex">
    <input type="text" name="keyword" th:value="${keyword}"
           placeholder="Search by title or author"
           class="form-control me-2"/>

    <button type="submit" class="btn btn-outline-dark">Search</button>
</form>

<!-- ADD BUTTON -->
<div sec:authorize="hasRole('ADMIN')">
    <a th:href="@{/books/new}" class="btn btn-outline-dark mb-3">Add Book</a>
</div>
<div th:if="${success}" class="alert alert-success text-center">
    <span th:text="${success}"></span>
</div>

<div th:if="${error}" class="alert alert-danger text-center">
    <span th:text="${error}"></span>
</div>
<table class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>ISBN</th>
        <th>Year</th>
        <th>Available</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.isbn}"></td>
        <td th:text="${book.year}"></td>
        <td th:text="${book.available}"></td>
        <td>

            <!-- ADMIN ONLY CAN EDIT AND DELETE -->
            <div sec:authorize="hasRole('ADMIN')" style="display:inline;">

                <!-- EDIT -->
                <a th:href="@{'/books/' + ${book.id} + '/edit'}"
                   class="btn btn-outline-dark btn-sm">Edit</a>

                <!-- DELETE -->
                <form th:action="@{'/books/' + ${book.id}}" method="post" style="display:inline;">
                    <input type="hidden" name="_method" value="delete"/>
                    <button type="submit" class="btn btn-outline-dark btn-sm">Delete</button>
                </form>

            </div>

            <!-- ALL USERS -->
            <!-- BORROW -->
            <form th:if="${book.available}"
                  th:action="@{'/books/' + ${book.id} + '/borrow'}"
                  method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline-dark btn-sm">
                    Borrow
                </button>
            </form>

            <!-- RETURN -->
            <form th:if="${!book.available}"
                  th:action="@{'/books/' + ${book.id} + '/return'}"
                  method="post" style="display:inline;">
                <button type="submit" class="btn btn-outline-dark btn-sm">
                    Return
                </button>
            </form>

        </td>
    </tr>
    </tbody>
</table>


</body>
</html>
