<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Library Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body>

<form th:action="@{/books/search}" method="get" class="mb-3 d-flex">
    <input type="text" name="keyword" th:value="${keyword}"
           placeholder="Search by title or author"
           class="form-control me-2"/>

    <button type="submit" class="btn btn-dark">Search</button>
</form>

<a th:href="@{/books/new}" class="btn btn-primary mb-3">Add Book</a>

<table class="table table-striped table-bordered">
    <thead class="table-dark">
    <tr>
        <th>Title</th>
        <th>Author</th>
        <th>ISBN</th>
        <th>Year</th>
        <th>Available</th>
        <th>Actions</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="book : ${books}">
        <td th:text="${book.title}"></td>
        <td th:text="${book.author}"></td>
        <td th:text="${book.isbn}"></td>
        <td th:text="${book.year}"></td>
        <td th:text="${book.available}"></td>
        <td>
            <!-- EDIT -->
            <a th:href="@{'/books/' + ${book.id} + '/edit'}"
               class="btn btn-warning btn-sm">Edit</a>

            <!-- AVAILABILITY -->
            <form th:action="@{'/books/' + ${book.id} + '/toggle'}" method="post" style="display:inline;">
                <button type="submit"
                        th:text="${book.available} ? 'Borrow' : 'Return'"
                        class="btn btn-secondary btn-sm">
                </button>
            </form>
            <!-- DELETE (proper method) -->
            <form th:action="@{'/books/' + ${book.id}}" method="post" style="display:inline;">
                <input type="hidden" name="_method" value="delete"/>
                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
            </form>
        </td>
    </tr>
    </tbody>
</table>


</body>
</html>
