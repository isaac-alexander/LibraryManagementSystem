<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Add Book</h2>

<form th:action="@{${formAction}}" th:object="${book}" method="post">

    <input type="hidden" name="_method" th:if="${method == 'put'}" value="put" />

    <input type="hidden" th:field="*{id}" />

    <input type="text" th:field="*{title}" placeholder="Title" class="form-control mb-2"/>
    <div class="text-danger" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>

    <input type="text" th:field="*{author}" placeholder="Author" class="form-control mb-2"/>
    <div class="text-danger" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>

    <input type="text" th:field="*{isbn}" placeholder="ISBN" class="form-control mb-2"/>
    <div class="text-danger" th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}"></div>

    <input type="number" th:field="*{year}" placeholder="Year" class="form-control mb-2"/>
    <div class="text-danger" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></div>
    <button type="submit" class="btn btn-primary">Save</button>

</form>

</body>
</html>
