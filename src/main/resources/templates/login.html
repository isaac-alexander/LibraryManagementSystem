<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body class="d-flex justify-content-center align-items-center vh-100 bg-light">

<div class="card p-4 shadow" style="width: 350px;">

    <h3 class="text-center mb-4">Login</h3>

    <!-- show error message -->
    <div th:if="${loginError}" class="alert alert-danger text-center">
        <span th:text="${loginError}"></span>
    </div>

    <!-- logout success -->
    <div th:if="${param.logout}" class="alert alert-success text-center">
        logged out successfully
    </div>


    <form th:action="@{/login}" method="post">

        <input type="text" name="username" placeholder="Username"
               class="form-control mb-3" required/>

        <input type="password" name="password" placeholder="Password"
               class="form-control mb-3" required/>

        <button type="submit" class="btn btn-outline-dark w-100">Login</button>

    </form>

</div>

</body>
</html>
