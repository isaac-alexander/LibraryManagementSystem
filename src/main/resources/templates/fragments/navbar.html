<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.w3.org/1999/xhtml">
<body>

<div th:fragment="navbar">

    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom mb-4">
        <div class="container-fluid">

            <!-- Logo -->
            <a class="navbar-brand fw-bold text-dark" href="/books">Library System</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false"
                    aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Links -->
            <div class="collapse navbar-collapse" id="navbarNav">

                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/books">Books</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-dark" href="/my-books">My Books</a>
                    </li>

                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link text-dark" href="/books/new">Add Book</a>
                    </li>

                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link text-dark" href="/register">Register User</a>
                    </li>

                </ul>

                <!-- Logout -->
                <form th:action="@{/logout}" method="post" class="d-flex">
                    <button class="btn btn-outline-dark">Logout</button>
                </form>

            </div>
        </div>
    </nav>

</div>

</body>
</html>
