<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>My Borrowed Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h3 class="mb-4 text-center">Borrowed Books</h3>

    <!-- show warning if user has overdue books -->
    <div th:if="${hasOverdue}" class="alert alert-danger text-center fw-bold">
        you have overdue books. return them before borrowing again.
    </div>

    <table class="table table-bordered table-striped text-center">

        <thead class="table-dark">
        <tr>
            <th>Book Title</th>

            <!-- show user column only for admin -->
            <th sec:authorize="hasRole('ADMIN')">User</th>

            <th>Borrow Date</th>
            <th>Due Date</th>
            <th>Return Date</th>
            <th>Status</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="t : ${transactions}">

            <!-- book title -->
            <td th:text="${t.book.title}"></td>
            <td sec:authorize="hasRole('ADMIN')" th:text="${t.user.username}"></td>

            <!-- display day/month/year and hour:minute -->
            <td th:text="${t.borrowDate != null ? t.borrowDate.format(T(java.time.format.DateTimeFormatter).ofPattern('dd/MM/yyyy HH:mm')) : 'N/A'}"></td>
            <td th:text="${t.dueDate != null ? t.dueDate.format(T(java.time.format.DateTimeFormatter).ofPattern('dd/MM/yyyy HH:mm')) : 'N/A'}"></td>
            <td th:text="${t.returnDate != null ? t.returnDate.format(T(java.time.format.DateTimeFormatter).ofPattern('dd/MM/yyyy HH:mm')) : 'Not returned'}"></td>

            <!-- status and overdue -->
            <td>
                <span th:text="${t.returned ? 'Returned' : 'Borrowed'}"></span>
                <span th:if="${!t.returned and t.dueDate.isBefore(T(java.time.LocalDateTime).now())}"
                      class="text-danger fw-bold ms-2">
                    overdue
                </span>
            </td>

            <!-- return button only for owner or admin -->
            <td>
                <form th:if="${!t.returned}"
                      th:action="@{'/books/' + ${t.book.id} + '/return'}"
                      method="post">

                    <button type="submit" class="btn btn-outline-dark w-100"
                            th:disabled="${!#authentication.name.equals(t.user.username) and !#authorization.expression('hasRole(''ADMIN'')')}">
                        Return
                    </button>
                </form>
            </td>
        </tr>

        <!-- show message if no data -->
        <tr th:if="${#lists.isEmpty(transactions)}">
            <td colspan="7">No records found</td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
