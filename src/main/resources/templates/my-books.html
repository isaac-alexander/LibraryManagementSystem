<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>My Borrowed Books</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

    <h3 class="mb-4 text-center">Borrowed Books</h3>

    <table class="table table-bordered table-striped text-center">

        <thead class="table-dark">
        <tr>
            <th>Book Title</th>

            <!-- show user column only for admin -->
            <th sec:authorize="hasRole('ADMIN')">User</th>

            <th>Borrow Date</th>
            <th>Due Date</th>
            <th>Return Date</th>
            <th>Status</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="t : ${transactions}">

            <!-- book title -->
            <td th:text="${t.book.title}"></td>

            <!-- username admin only -->
            <td sec:authorize="hasRole('ADMIN')"
                th:text="${t.user.username}"></td>

            <!-- borrow date -->
            <td th:text="${t.borrowDate}"></td>

            <!-- show due date -->
            <td th:text="${t.dueDate}"></td>

            <td th:text="${t.returnDate != null ? t.returnDate : 'Not returned'}"></td>

            <td th:text="${t.returned ? 'Returned' : 'Borrowed'}"></td>

        </tr>

        <!-- show message if no data -->
        <tr th:if="${#lists.isEmpty(transactions)}">
            <td colspan="5">No records found</td>
        </tr>

        </tbody>

    </table>

</div>

</body>
</html>
